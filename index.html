<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veloria Eats</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: #020617;
      position: fixed;
      width: 100%;
      top: 0;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: white;
    }

    nav a:hover {
      color: orange;
    }

    .search input {
      padding: 5px;
      border-radius: 5px;
      border: none;
    }

    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
      url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092') no-repeat center/cover;
    }

    .hero h1 {
      font-size: 50px;
    }

    .btn {
      padding: 10px 20px;
      background: orange;
      border: none;
      color: white;
      margin-top: 20px;
      cursor: pointer;
    }

    .features {
      padding: 50px;
      display: flex;
      gap: 20px;
      justify-content: center;
      background: #111827;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
    }
  </style>
</head>

<body>

<header>
  <h2>Veloria Eats</h2>

  <nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Menu</a>
    <a href="#">Jobs</a>
    <a href="#">Tracking</a>
    <a href="#">Contact</a>
  </nav>

  <div class="search">
    <input type="text" placeholder="Search...">
  </div>
</header>

<section class="hero">
  <div>
    <h1>Welcome to Veloria Eats</h1>
    <p>Delicious food, delivered fast</p>
    <button class="btn">Order Now</button>
  </div>
</section>

<section class="features">
  <div class="card">
    <h3>Fast Delivery</h3>
    <p>Quick service</p>
  </div>

  <div class="card">
    <h3>Fresh Food</h3>
    <p>Quality ingredients</p>
  </div>

  <div class="card">
    <h3>Best Taste</h3>
    <p>Premium experience</p>
  </div>
</section>

<footer>
  <p>© 2026 Veloria Eats</p>
</footer>

</body>
</html>
