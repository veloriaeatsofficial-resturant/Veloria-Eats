<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veloria Eats - Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: rgba(0,0,0,0.8);
  position: fixed;
  width: 100%;
  top: 0;
  z-index: 1000;
  flex-wrap: wrap;
}

nav h1 {
  color: #fff;
  margin: 0;
  font-size: 24px;
}

nav ul {
  list-style: none;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 10px 0 0 0;
  padding: 0;
}

nav ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 15px;
  border-radius: 8px;
  transition: 0.3s;
}

nav ul li a.home { background: #ff6f61; }
nav ul li a.about { background: #6a11cb; }
nav ul li a.menu { background: #2575fc; }
nav ul li a.jobs { background: #11998e; }
nav ul li a.tracking { background: #ee0979; }
nav ul li a.contact { background: #ff6a00; }

nav ul li a:hover {
  opacity: 0.8;
}

nav input {
  padding: 6px;
  border-radius: 6px;
  border: none;
  margin-left: auto;
  min-width: 120px;
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1555396273-367ea4eb4db5') no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
  padding: 0 20px;
}

.hero h2 {
  font-size: 40px;
  background: rgba(0,0,0,0.6);
  padding: 20px;
  border-radius: 10px;
}

/* Responsive */
@media(max-width:768px) {
  nav {
    flex-direction: column;
    align-items: flex-start;
  }

  nav ul {
    flex-direction: column;
    width: 100%;
  }

  nav input {
    margin: 10px 0 0 0;
    width: 100%;
  }

  .hero h2 {
    font-size: 28px;
  }
}

  </style>
</head>
<body><nav>
  <h1>Veloria Eats</h1>
  <ul>
    <li><a href="index.html" class="home">Home</a></li>
    <li><a href="about.html" class="about">About</a></li>
    <li><a href="menu.html" class="menu">Menu</a></li>
    <li><a href="jobs.html" class="jobs">Jobs</a></li>
    <li><a href="tracking.html" class="tracking">Tracking</a></li>
    <li><a href="contact.html" class="contact">Contact</a></li>
  </ul>
  <input type="text" id="search" placeholder="Search page..." onkeypress="searchPage(event)">
</nav><div class="hero">
  <h2>Welcome to Veloria Eats 🍽️<br>Experience Premium Taste</h2>
</div><script>
  function searchPage(event) {
    if (event.key === 'Enter') {
      let value = document.getElementById('search').value.toLowerCase();
      const pages = {
        'home': 'index.html',
        'about': 'about.html',
        'menu': 'menu.html',
        'jobs': 'jobs.html',
        'tracking': 'tracking.html',
        'contact': 'contact.html'
      };

      if (pages[value]) {
        window.location.href = pages[value];
      } else {
        alert('Page not found');
      }
    }
  }
</script></body>
</html>
